# HTTPS (port 443). Enabled by enable-ssl.sh only once the cert exists.
# tftlab.com.br, www and app.tftlab.com.br -> the Next.js site. Payment webhooks
# are served by the site at /api/webhooks/{stripe,mercadopago}.

ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# --- App (tftlab.com.br + www + app.tftlab.com.br) --------------------------
server {
    listen 443 ssl;
    server_name tftlab.com.br www.tftlab.com.br app.tftlab.com.br;

    ssl_certificate /etc/letsencrypt/live/tftlab.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tftlab.com.br/privkey.pem;

    client_max_body_size 5m;

    location / {
        proxy_pass http://site:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }
}
