# HTTP (port 80): serve the ACME challenge (certbot) + redirect everything to
# HTTPS. Always loaded. Covers the apex + www.
server {
    listen 80;
    server_name tftlab.com.br www.tftlab.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
