# VPS stack: the TFTLab site (Next.js) + its Postgres + an expiry cron, behind
# one Nginx (SSL via certbot). Payments (Stripe recurring + Mercado Pago
# one-time) and the Discord subscriber-role grant now live IN the site
# (src/app/api/{discord,webhooks,cron}) — there is no separate bot.
#
# Layout on the VPS (run `docker compose` from this deploy/ dir):
#   /opt/tftlab/            <- this site repo (context "..")
#   /opt/tftlab/deploy/     <- this folder (docker-compose.yml, nginx/, .env)
#
# Domain (set in .env): tftlab.com.br -> site. The provider webhooks point at
# https://app.tftlab.com.br/api/webhooks/{stripe,mercadopago}.

services:
  # --- Site (Next.js) --------------------------------------------------------
  site-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SITE_DB_USER:-tftlab}
      POSTGRES_PASSWORD: ${SITE_DB_PASSWORD:?SITE_DB_PASSWORD required}
      POSTGRES_DB: ${SITE_DB_NAME:-tftlab_site}
    volumes:
      - ./data/site-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SITE_DB_USER:-tftlab} -d ${SITE_DB_NAME:-tftlab_site}"]
      interval: 5s
      timeout: 5s
      retries: 5

  site:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_NOINDEX: ${NEXT_PUBLIC_NOINDEX:-}
        NEXT_PUBLIC_STRIPE_LINK_MONTH: ${NEXT_PUBLIC_STRIPE_LINK_MONTH:-}
        NEXT_PUBLIC_STRIPE_LINK_YEAR: ${NEXT_PUBLIC_STRIPE_LINK_YEAR:-}
        NEXT_PUBLIC_MP_LINK_MONTH: ${NEXT_PUBLIC_MP_LINK_MONTH:-}
        NEXT_PUBLIC_MP_LINK_YEAR: ${NEXT_PUBLIC_MP_LINK_YEAR:-}
        # Frontend public key for MP Checkout Bricks (card tokenization).
        NEXT_PUBLIC_MP_PUBLIC_KEY: ${NEXT_PUBLIC_MP_PUBLIC_KEY:-}
    restart: unless-stopped
    depends_on:
      site-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${SITE_DB_USER:-tftlab}:${SITE_DB_PASSWORD}@site-db:5432/${SITE_DB_NAME:-tftlab_site}
      DATABASE_URL_UNPOOLED: postgresql://${SITE_DB_USER:-tftlab}:${SITE_DB_PASSWORD}@site-db:5432/${SITE_DB_NAME:-tftlab_site}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      # Canonical public URL for Auth.js. Without it, next-auth builds OAuth
      # callback URLs from the container HOSTNAME (0.0.0.0:3000), so Discord
      # rejects the redirect_uri. Pin it to the public origin.
      AUTH_URL: ${AUTH_URL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CURATOR_EMAIL: ${CURATOR_EMAIL}
      CURATOR_PASSWORD: ${CURATOR_PASSWORD}
      # Payments → Discord subscriber role (webhooks live on the site now, at
      # https://app.tftlab.com.br/api/webhooks/{stripe,mercadopago}). Runtime-only
      # secrets (the NEXT_PUBLIC_* payment links are build args above).
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_ROLE_ID: ${DISCORD_ROLE_ID}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
      MP_PRICE_MONTH: ${MP_PRICE_MONTH:-}
      MP_PRICE_YEAR: ${MP_PRICE_YEAR:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      DISCORD_INVITE_CHANNEL_ID: ${DISCORD_INVITE_CHANNEL_ID:-}
      DISCORD_INVITE_URL: ${DISCORD_INVITE_URL:-}
      CRON_SECRET: ${CRON_SECRET}

  # --- Cron: expira assinaturas vencidas (MP one-time / backstop do Stripe) ---
  # Sem SDK/imagem extra: busybox wget bate no endpoint do site de hora em hora.
  cron:
    image: alpine:3
    restart: unless-stopped
    depends_on:
      - site
    environment:
      CRON_SECRET: ${CRON_SECRET}
    entrypoint:
      - /bin/sh
      - -c
      - 'while :; do wget -q -O /dev/null --header="Authorization: Bearer $${CRON_SECRET}" http://site:3000/api/cron/expire-subscriptions || true; sleep 3600; done'

  # --- Nginx + SSL -----------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    # Custom command: (1) enable HTTPS if the cert exists, (2) reload every 12h so
    # renewed certs are picked up. IMPORTANT: the nginx image only runs
    # /docker-entrypoint.d/* (incl. enable-ssl.sh) when the command STARTS WITH
    # "nginx" — since ours doesn't, we must run enable-ssl.sh ourselves here, or
    # HTTPS never gets enabled.
    command: ["/bin/sh", "-c", "sh /docker-entrypoint.d/40-enable-ssl.sh; while :; do sleep 12h; nginx -s reload; done & nginx -g 'daemon off;'"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/http.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl.conf:/etc/nginx/ssl-available.conf:ro
      - ./nginx/enable-ssl.sh:/docker-entrypoint.d/40-enable-ssl.sh:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - site

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"
